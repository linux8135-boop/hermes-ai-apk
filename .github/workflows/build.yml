name: Build Hermes APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for this build'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libffi-dev libssl-dev python3-dev \
            libncurses-dev ccache cmake make patchelf libltdl-dev

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Cache buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build APK with buildozer
        run: |
          buildozer android debug
        env:
          PYTHONUNBUFFERED: 1
          ACLOCAL_PATH: /usr/share/aclocal

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-ai-apk
          path: bin/*.apk
          if-no-files-found: error
